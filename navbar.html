    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        .navbar-custom {
            background-color: white;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 10px 20px;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
        }
        .navbar-custom a {
            color: black;
            text-decoration: none;
            font-size: 18px;
        }
        .navbar-custom a:hover {
            color: #007bff;
        }
    </style>
</head>

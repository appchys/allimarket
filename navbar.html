<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Inferior</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    
    <style>
        /* Barra de navegación inferior */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #fff;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        /* Estilos para los íconos */
        .nav-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 15px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }

        .nav-btn.active {
            color: #3897f0;
        }

        /* Espaciado para evitar solapamiento con la barra */
        body {
            padding-bottom: 70px;
        }

        /* Ajuste para pantallas pequeñas */
        @media (max-width: 768px) {
            .bottom-nav {
                padding: 5px 0;
            }
            .nav-btn {
                font-size: 20px;
            }
            body {
                padding-bottom: 60px;
            }
        }
    </style>
</head>
<body>

<!-- Barra de navegación inferior -->
<nav class="bottom-nav">
    <a href="index.html" class="nav-btn">
        <i class="bi bi-compass"></i>
    </a>
    <a href="checkout.html" class="nav-btn">
        <i class="bi bi-cart"></i>
    </a>
    <!-- Botón para abrir el modal -->
    <button class="nav-btn" data-bs-toggle="modal" data-bs-target="#addModal">
        <i class="bi bi-plus-circle"></i>
    </button>
    <a href="profile.html" class="nav-btn">
        <i class="bi bi-person"></i>
    </a>
</nav>

<!-- Modal para añadir Producto o Historia -->
<div class="modal fade" id="addModal" tabindex="-1" aria-labelledby="addModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addModalLabel">¿Qué deseas añadir?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <button class="btn btn-primary w-100 mb-2" id="add-product">
                    <i class="bi bi-box"></i> Producto
                </button>
                <button class="btn btn-secondary w-100" id="add-story">
                    <i class="bi bi-image"></i> Historia
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById("add-product").addEventListener("click", () => {
        alert("Abrir modal para añadir Producto");
    });

    document.getElementById("add-story").addEventListener("click", () => {
        alert("Abrir modal para añadir Historia");
    });
</script>

</body>
</html>

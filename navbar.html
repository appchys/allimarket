<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Inferior</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #fff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
        .nav-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #333;
        }
        .popover-menu {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            padding: 10px;
            display: none;
            flex-direction: column;
            width: 160px;
        }
        .popover-menu button {
            padding: 10px;
            text-align: left;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="bottom-nav">
        <button id="add-btn" class="nav-btn">
            <i class="bi bi-plus-circle"></i>
        </button>
    </nav>
    <div id="Popover-menu" class="popover-menu">
        <button>Producto</button>
        <button>Historia</button>
    </div>

    <script>
        const addBtn = document.getElementById("add-btn");
        const popoverMenu = document.getElementById("popover-menu");

        addBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            popoverMenu.style.display = popoverMenu.style.display === "flex" ? "none" : "flex";
            console.log("Botón clicado, popover:", popoverMenu.style.display);
        });

        document.addEventListener("click", (e) => {
            if (!popoverMenu.contains(e.target) && e.target !== addBtn) {
                popoverMenu.style.display = "none";
            }
        });
    </script>
</body>
</html>

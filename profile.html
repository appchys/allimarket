<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All I Market - Mi Perfil</title>
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/add-menu.css">
</head>
<body>
    <header>
        <h1>All I Market</h1>
        <div class="header-right">
            <div id="search-container" style="display: none;">
                <input type="text" id="search-input" placeholder="Buscar...">
                <button id="search-toggle-btn"><i class="bi bi-search"></i></button>
            </div>
            <div id="auth-section">
                <button id="login-btn">Iniciar Sesión con Google</button>
                <button id="logout-btn" style="display:none;"><i class="bi bi-box-arrow-right"></i></button>
            </div>
        </div>
    </header>



    <main>
        <section id="user-profile" class="store-profile">
            <img id="profile-image" src="https://placehold.co/100x100" alt="Foto de perfil">
            <div class="store-info">
                <h2 id="profile-name">Nombre</h2>
                <p id="profile-slug">@usuario</p>
                <p id="profile-description">Descripción</p>
                <p id="profile-phone">Celular: No disponible</p>
                <div id="profile-actions">
                    <button id="edit-profile-btn">Editar Perfil</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Nueva sección para las órdenes -->
    <section id="user-orders">
        <h2>Mis Pedidos</h2>
        <div class="order-group">
            <h3 class="order-group-title">Pendientes</h3>
            <div class="orders-grid" id="pending-orders"></div>
        </div>
        <div class="order-group">
            <h3 class="order-group-title">En Despacho</h3>
            <div class="orders-grid" id="dispatching-orders"></div>
        </div>
        <div class="order-group">
            <h3 class="order-group-title">Finalizados</h3>
            <div class="orders-grid" id="completed-orders"></div>
        </div>
    </section>


    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAAAFDJ_utlimCezUR-_i8Y2yUare9yZ1k",
            authDomain: "multitienda-69778.firebaseapp.com",
            projectId: "multitienda-69778",
            storageBucket: "multitienda-69778.firebasestorage.app",
            messagingSenderId: "939925630795",
            appId: "1:939925630795:web:713aca499392bfa36482ce"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // Cargar datos del perfil
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    document.getElementById('profile-name').textContent = userData.name;
                    document.getElementById('profile-slug').textContent = `@${userData.slug}`;
                    document.getElementById('profile-description').textContent = userData.description;
                    document.getElementById('profile-phone').textContent = `Celular: ${userData.phone || 'No disponible'}`;
                    if (userData.imageUrl) {
                        document.getElementById('profile-image').src = userData.imageUrl;
                    }
                }

                // Cargar órdenes del usuario
                await loadUserOrders(user.uid);
            }
        });

        async function loadUserOrders(userId) {
    const containers = {
        pending: document.getElementById('pending-orders'),
        dispatching: document.getElementById('dispatching-orders'),
        completed: document.getElementById('completed-orders')
    };

    // Limpiar contenedores
    Object.values(containers).forEach(container => container.innerHTML = '');

    try {
        const ordersQuery = query(collection(db, 'orders'), where('userId', '==', userId));
        const querySnapshot = await getDocs(ordersQuery);

        if (querySnapshot.empty) {
            containers.pending.innerHTML = '<p>No tienes órdenes registradas.</p>';
            return;
        }

        // Ordenar y agrupar órdenes
        const orders = [];
        querySnapshot.forEach(doc => {
            const order = doc.data();
            order.id = doc.id;
            orders.push(order);
        });

        // Ordenar por fecha y estado
        orders.sort((a, b) => b.createdAt - a.createdAt);
        orders.sort((a, b) => {
            const statusOrder = { 'pending': 0, 'dispatching': 1, 'completed': 2 };
            return statusOrder[a.status] - statusOrder[b.status];
        });

        // Agregar al DOM
        orders.forEach(order => {
            const orderElement = document.createElement('div');
            orderElement.classList.add('order-card');
            orderElement.innerHTML = `
                <div class="order-content">
                    <div class="store-info">
                        <p class="store-name"><i class="bi bi-shop"></i>${order.storeName}</p>
                        <div class="order-details">
                            <div class="order-detail-item">
                                <span>N° Orden:</span>
                                <span>${order.id}</span>
                            </div>
                            <div class="order-detail-item">
                                <span>Fecha:</span>
                                <span>${new Date(order.createdAt).toLocaleDateString()}</span>
                            </div>
                            <div class="order-products">
                                ${order.items.map(item => `
                                    ${item.quantity}x ${item.name}
                                `).join(', ')}
                            </div>
                        </div>
                        <div class="status-section">
                            <div class="status-tag status-${order.status}">${order.status}</div>
                            <div class="order-price">$${order.totalCost.toFixed(2)}</div>
                        </div>
                    </div>
                </div>
            `;

            switch(order.status) {
                case 'pending':
                    containers.pending.appendChild(orderElement);
                    break;
                case 'dispatching':
                    containers.dispatching.appendChild(orderElement);
                    break;
                case 'completed':
                    containers.completed.appendChild(orderElement);
                    break;
            }
        });

    } catch (error) {
        console.error('Error al cargar las órdenes:', error);
        containers.pending.innerHTML = '<p>Error al cargar las órdenes. Intenta de nuevo más tarde.</p>';
    }
}
    </script>
    <script type="module" src="js/app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de la Tienda</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js"></script>
    <style>
        /* Agrega aquí tus estilos */
    </style>
</head>
<body>
    <div id="store-profile">
        <img id="store-image" src="" alt="Imagen de la tienda">
        <h1 id="store-name">Cargando...</h1>
        <p id="store-followers">0 seguidores</p>
        <p id="store-description">Descripción de la tienda</p>
        <div id="store-actions"></div>
        <div id="stories-container"></div>
        <div id="feed-container"></div>
    </div>
    <script>
        // Inicializar Firebase
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        const auth = firebase.auth();

        document.addEventListener('DOMContentLoaded', async () => {
            const storeNameElement = document.getElementById('store-name');
            const storeImageElement = document.getElementById('store-image');
            const storeFollowersElement = document.getElementById('store-followers');
            const storeDescriptionElement = document.getElementById('store-description');
            const storeActionsElement = document.getElementById('store-actions');
            
            let slug = window.location.pathname.split('/').filter(Boolean)[0];
            if (!slug) {
                storeNameElement.textContent = 'Error: Tienda no especificada';
                return;
            }

            try {
                const storeDoc = await db.collection('stores').doc(slug).get();
                if (!storeDoc.exists) {
                    storeNameElement.textContent = 'Tienda no encontrada';
                    return;
                }
                const storeData = storeDoc.data();
                storeNameElement.textContent = storeData.name || 'Sin nombre';
                storeImageElement.src = storeData.imageUrl || 'https://placehold.co/100x100';
                storeFollowersElement.textContent = `${storeData.followers || 0} seguidores`;
                storeDescriptionElement.textContent = storeData.description || 'Sin descripción';

                const followButton = document.createElement('button');
                followButton.textContent = 'Seguir';
                followButton.addEventListener('click', async () => {
                    const newFollowers = (storeData.followers || 0) + 1;
                    await db.collection('stores').doc(slug).set({ followers: newFollowers }, { merge: true });
                    storeFollowersElement.textContent = `${newFollowers} seguidores`;
                    followButton.disabled = true;
                    followButton.textContent = 'Siguiendo';
                });
                storeActionsElement.appendChild(followButton);
            } catch (error) {
                storeNameElement.textContent = 'Error al cargar la tienda';
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>

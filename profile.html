<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All I Market - Mi Perfil</title>
    <style>
        /* Estilos generales */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #search-container input {
            padding: 5px;
            border: none;
            border-radius: 3px;
        }

        #search-toggle-btn, #login-btn, #logout-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        #login-btn {
            background-color: #4285f4;
            color: white;
        }

        #logout-btn {
            background-color: #ff4444;
            color: white;
        }

        main {
            padding: 20px;
        }

        /* Estilos para la sección de pedidos */
        .orders-section {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .order-item {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        .order-item h3 {
            margin: 0 0 10px;
            font-size: 1.2em;
        }

        .order-item p {
            margin: 5px 0;
        }

        /* Estilos para el perfil */
        .store-profile {
            max-width: 800px;
            margin: 20px auto;
            display: flex;
            gap: 20px;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .store-profile img {
            border-radius: 50%;
            object-fit: cover;
        }

        .store-info {
            flex: 1;
        }

        .store-info h2 {
            margin: 0 0 10px;
            font-size: 1.5em;
        }

        .store-info p {
            margin: 5px 0;
            color: #555;
        }

        #edit-profile-btn {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        #edit-profile-btn:hover {
            background-color: #0056b3;
        }

        /* Estilos para el modal del carrito */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            position: relative;
            max-width: 500px;
            width: 100%;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            border: none;
            background: none;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>All I Market</h1>
        <div class="header-right">
            <div id="search-container" style="display: none;">
                <input type="text" id="search-input" placeholder="Buscar...">
                <button id="search-toggle-btn"><i class="bi bi-search"></i></button>
            </div>
            <div id="auth-section">
                <button id="login-btn">Iniciar Sesión con Google</button>
                <button id="logout-btn" style="display:none;"><i class="bi bi-box-arrow-right"></i></button>
            </div>
        </div>
    </header>
    <main>
        <!-- Sección de pedidos realizados -->
        <section id="user-orders" class="orders-section">
            <h2>Mis Pedidos</h2>
            <div id="orders-list"></div>
        </section>

        <!-- Sección del perfil del usuario -->
        <section id="user-profile" class="store-profile">
            <img id="profile-image" src="https://placehold.co/100x100" alt="Foto de perfil">
            <div class="store-info">
                <h2 id="profile-name">Nombre</h2>
                <p id="profile-slug">@usuario</p>
                <p id="profile-description">Descripción</p>
                <p id="profile-phone">Celular: No disponible</p>
                <div id="profile-actions">
                    <button id="edit-profile-btn">Editar Perfil</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Punto de inserción para la barra de navegación -->
    <div id="nav-container"></div>

    <!-- Modal del carrito -->
    <div id="cart-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>Carrito de Compras</h2>
            <div id="cart-items"></div>
            <button id="close-cart-modal" class="close-btn">✖</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getFirestore, doc, getDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAAAFDJ_utlimCezUR-_i8Y2yUare9yZ1k",
            authDomain: "multitienda-69778.firebaseapp.com",
            projectId: "multitienda-69778",
            storageBucket: "multitienda-69778.firebasestorage.app",
            messagingSenderId: "939925630795",
            appId: "1:939925630795:web:713aca499392bfa36482ce"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // Cargar datos del perfil
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    document.getElementById('profile-name').textContent = userData.name;
                    document.getElementById('profile-slug').textContent = `@${userData.slug}`;
                    document.getElementById('profile-description').textContent = userData.description;
                    document.getElementById('profile-phone').textContent = `Celular: ${userData.phone || 'No disponible'}`;
                    if (userData.imageUrl) {
                        document.getElementById('profile-image').src = userData.imageUrl;
                    }
                }

                // Cargar pedidos realizados
                await loadUserOrders(user.uid);
            }
        });

        async function loadUserOrders(userId) {
            const ordersList = document.getElementById('orders-list');
            try {
                const ordersQuery = await getDocs(collection(db, 'orders'));
                const userOrders = ordersQuery.docs.filter(doc => doc.data().userId === userId);

                if (userOrders.length === 0) {
                    ordersList.innerHTML = '<p>No tienes pedidos realizados aún.</p>';
                    return;
                }

                ordersList.innerHTML = '';
                userOrders.forEach(orderDoc => {
                    const orderData = orderDoc.data();
                    const orderElement = document.createElement('div');
                    orderElement.classList.add('order-item');

                    // Mostrar información básica de la orden
                    const itemsList = Object.values(orderData.cartItems)
                        .map(item => `${item.name} (x${item.quantity}) - $${(item.price * item.quantity).toFixed(2)}`)
                        .join('<br>');

                    orderElement.innerHTML = `
                        <h3>Orden ID: ${orderDoc.id}</h3>
                        <p><strong>Tienda:</strong> ${orderData.storeId}</p>
                        <p><strong>Productos:</strong><br>${itemsList}</p>
                        <p><strong>Costo de envío:</strong> $${orderData.shippingCost.toFixed(2)}</p>
                        <p><strong>Total:</strong> $${orderData.totalCost.toFixed(2)}</p>
                        <p><strong>Estado:</strong> ${orderData.status}</p>
                        <p><strong>Fecha:</strong> ${new Date(orderData.createdAt).toLocaleString()}</p>
                    `;
                    ordersList.appendChild(orderElement);
                });
            } catch (error) {
                console.error('Error al cargar los pedidos:', error);
                ordersList.innerHTML = '<p>Error al cargar los pedidos. Intenta de nuevo más tarde.</p>';
            }
        }
    </script>
    <script type="module" src="js/app.js"></script>
    <!-- Scripts de Cloudflare omitidos por brevedad -->
</body>
</html>

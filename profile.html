<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All I Market - Mi Perfil</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #333; color: white; }
        #user-profile { display: flex; align-items: center; padding: 20px; }
        #profile-image { border-radius: 50%; margin-right: 20px; }
        #orders-section { padding: 20px; }
        .order { border-bottom: 1px solid #ddd; padding: 10px 0; }
    </style>
</head>
<body>
    <header>
        <h1>All I Market</h1>
        <div class="header-right">
            <button id="logout-btn" style="display:none;">Cerrar Sesión</button>
        </div>
    </header>
    <main>
        <section id="user-profile" class="store-profile">
            <img id="profile-image" src="https://placehold.co/100x100" alt="Foto de perfil">
            <div class="store-info">
                <h2 id="profile-name">Nombre</h2>
                <p id="profile-slug">@usuario</p>
                <p id="profile-description">Descripción</p>
                <p id="profile-phone">Celular: No disponible</p>
            </div>
        </section>
        <section id="orders-section">
            <h2>Mis Órdenes</h2>
            <div id="orders-list">Cargando órdenes...</div>
        </section>
    </main>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAAAFDJ_utlimCezUR-_i8Y2yUare9yZ1k",
            authDomain: "multitienda-69778.firebaseapp.com",
            projectId: "multitienda-69778",
            storageBucket: "multitienda-69778.firebasestorage.app",
            messagingSenderId: "939925630795",
            appId: "1:939925630795:web:713aca499392bfa36482ce"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const ordersRef = collection(db, 'orders');
                const q = query(ordersRef, where("userId", "==", user.uid));
                const querySnapshot = await getDocs(q);
                const ordersList = document.getElementById('orders-list');
                ordersList.innerHTML = '';
                
                querySnapshot.forEach((doc) => {
                    const orderData = doc.data();
                    const orderElement = document.createElement('div');
                    orderElement.classList.add('order');
                    orderElement.innerHTML = `
                        <p><strong>Orden ID:</strong> ${doc.id}</p>
                        <p><strong>Fecha:</strong> ${orderData.date}</p>
                        <p><strong>Total:</strong> $${orderData.total}</p>
                    `;
                    ordersList.appendChild(orderElement);
                });
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario</title>
</head>
<body>
    <h1>Perfil</h1>
    <img id="profile-image" src="default-profile.png" alt="Foto de perfil" width="100">
    <p id="profile-name"></p>
    <p id="profile-slug"></p>
    <p id="profile-description"></p>
    <p id="profile-phone"></p>
    
    <h2>Órdenes Recientes</h2>
    <div id="orders-list">
        <p>Cargando órdenes...</p>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    document.getElementById('profile-name').textContent = userData.name;
                    document.getElementById('profile-slug').textContent = `@${userData.slug}`;
                    document.getElementById('profile-description').textContent = userData.description;
                    document.getElementById('profile-phone').textContent = `Celular: ${userData.phone || 'No disponible'}`;
                    if (userData.imageUrl) {
                        document.getElementById('profile-image').src = userData.imageUrl;
                    }
                }
                
                // Cargar órdenes del usuario
                const ordersList = document.getElementById('orders-list');
                ordersList.innerHTML = '';
                const ordersQuery = query(collection(db, 'orders'), where('userId', '==', user.uid));
                const ordersSnapshot = await getDocs(ordersQuery);
                
                if (ordersSnapshot.empty) {
                    ordersList.innerHTML = '<p>No tienes órdenes registradas.</p>';
                } else {
                    ordersSnapshot.forEach(doc => {
                        const order = doc.data();
                        const orderElement = document.createElement('div');
                        orderElement.classList.add('order-item');
                        orderElement.innerHTML = `
                            <p><strong>Tienda:</strong> ${order.storeId}</p>
                            <p><strong>Total:</strong> $${order.totalCost.toFixed(2)}</p>
                            <p><strong>Estado:</strong> ${order.status}</p>
                            <p><strong>Fecha:</strong> ${new Date(order.createdAt).toLocaleString()}</p>
                            <hr>
                        `;
                        ordersList.appendChild(orderElement);
                    });
                }
            } else {
                document.getElementById('orders-list').innerHTML = '<p>Inicia sesión para ver tus órdenes.</p>';
            }
        });
    </script>
</body>
</html>

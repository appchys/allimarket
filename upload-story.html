<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Historia</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/upload-story.css">
</head>
<body>
    <header>
        <h1>Subir Historia</h1>
    </header>
    <main>
        <div id="post-story-modal" class="modal">
            <div class="modal-content">
                <div id="story-preview-container" style="display: none;">
                    <img id="preview-image" alt="Vista previa">
                    <div id="story-actions">
                        <button id="publish-story-btn" title="Publicar">✔️ Publicar</button>
                    </div>
                </div>
                <button id="close-story-modal" class="close-btn">✖ Cerrar</button>
            </div>
        </div>
    </main>
    <script type="module" src="js/upload-story.js"></script>
</body>
</html>

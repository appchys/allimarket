<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Story View Modal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .story-modal-content {
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        #story-image {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }

        #product-tags {
            margin: 10px 0;
            min-height: 20px;
        }

        .modal-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .action-btn, .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            padding: 5px 10px;
            transition: color 0.3s;
        }

        .delete-btn:hover {
            color: #ff4444;
        }

        .close-btn:hover {
            color: #555;
        }
    </style>
</head>
<body>
    <div id="story-view-modal" class="modal" style="display:none;">
        <div class="story-modal-content">
            <img id="story-image" src="" alt="Historia">
            <div id="product-tags"></div>
            <div class="modal-buttons">
                <button id="delete-story" class="action-btn delete-btn"><i class="bi bi-trash"></i></button>
                <button id="close-story-view" class="close-btn"><i class="bi bi-x-lg"></i></button>
            </div>
        </div>
    </div>

    <script>
        class StoryViewModal {
            constructor() {
                this.modal = document.getElementById('story-view-modal');
                this.closeBtn = document.getElementById('close-story-view');
                this.deleteBtn = document.getElementById('delete-story');
                this.storyImage = document.getElementById('story-image');
                this.productTags = document.getElementById('product-tags');
            }

            show(imageSrc, tags = '') {
                this.storyImage.src = imageSrc;
                this.productTags.innerHTML = tags;
                this.modal.style.display = 'flex';
            }

            hide() {
                this.modal.style.display = 'none';
                this.storyImage.src = '';
                this.productTags.innerHTML = '';
            }

            getCloseButton() {
                return this.closeBtn;
            }

            getDeleteButton() {
                return this.deleteBtn;
            }
        }

        const storyModal = new StoryViewModal();
        window.storyModal = storyModal;

        // Disparar un evento personalizado cuando el modal esté listo
        document.dispatchEvent(new Event('storyModalReady'));
    </script>

</html>

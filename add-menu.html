<!-- add-menu.html -->
<div id="add-menu" class="add-menu" style="display: none;"></div>

<!-- Modal para subir historias -->
<div id="upload-story-modal" class="upload-story-modal" style="display: none;">
    <div class="upload-story-content">
        <!-- Botón de cerrar -->
        <button id="close-story-modal">✖</button>

        <h2>Subir Historia</h2>
        <div id="story-source-options">
            <!-- Botones apilados verticalmente -->
            <button id="story-camera" class="btn-option">
                <i class="bi bi-camera"></i> Cámara
            </button>
            <button id="story-gallery" class="btn-option">
                <i class="bi bi-image"></i> Galería
            </button>
        </div>
        <div id="story-preview-container" style="display: none;">
            <div class="preview-wrapper">
                <img id="preview-image" src="" alt="Vista previa de la historia">
                <div id="preview-tags"></div>
            </div>
            <select id="story-product" style="display: none;">
                <option value="">Selecciona un producto</option>
            </select>
            <button id="tag-products-btn"><i class="bi bi-tag"></i> Etiquetar productos</button>
            <button id="publish-story-btn"><i class="bi bi-upload"></i> Publicar</button>
        </div>
    </div>
</div>

<script src="add-menu.js"></script>

    <style>
        /* Estilos adicionales específicos para orders */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 1rem;
        }

        .order-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .order-map {
            height: 150px;
            background: #eee;
            display: grid;
            place-items: center;
            color: #666;
        }

        .order-content {
            padding: 1rem;
        }

        .client-info {
            margin-bottom: 1rem;
        }

        .client-name {
            font-weight: bold;
            margin: 0;
            color: #333;
        }

        .cart-details {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 1rem;
        }

        .status-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
        }

        .status-tag {
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8em;
            background: #eee;
        }

        .status-actions {
            display: flex;
            gap: 0.5rem;
        }

        .status-btn {
            padding: 0.3rem 0.8rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .prepare-btn {
            background: #ffd700;
            color: #000;
        }

        .delivered-btn {
            background: #90EE90;
            color: #000;
        }
    </style>
</head>

        <h1>Órdenes Recibidas</h1>
        <div id="auth-section">
            <button id="logout-btn" style="display:none;"><i class="bi bi-box-arrow-right"></i></button>
        </div>
    </header>
    <main>
        <section id="orders-list">
            <div id="orders-container" class="orders-grid"></div>
        </section>

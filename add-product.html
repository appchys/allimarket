<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir Producto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="add-product-modal" class="modal" style="display:none;">
        <div class="modal-content" style="
            max-width: 500px;
            width: 90%;
            margin: 20px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            padding: 20px;
            font-family: Arial, sans-serif;
        ">
            <h2 style="
                margin: 0 0 20px;
                color: #333;
                font-size: 24px;
                text-align: center;
            ">
                <i class="bi bi-plus-circle" style="margin-right: 10px;"></i>Añadir Producto
            </h2>
            
            <form id="add-product-form" style="display: flex; flex-direction: column; gap: 15px;">
                <div style="position: relative;">
                    <i class="bi bi-tag" style="
                        position: absolute;
                        left: 10px;
                        top: 50%;
                        transform: translateY(-50%);
                        color: #666;
                    "></i>
                    <input type="text" id="product-name" placeholder="Nombre del producto" required style="
                        width: 100%;
                        padding: 10px 10px 10px 35px;
                        border: 1px solid #ddd;
                        border-radius: 5px;
                        font-size: 16px;
                        box-sizing: border-box;
                    ">
                </div>

                <div style="position: relative;">
                    <i class="bi bi-currency-dollar" style="
                        position: absolute;
                        left: 10px;
                        top: 50%;
                        transform: translateY(-50%);
                        color: #666;
                    "></i>
                    <input type="number" id="product-price" placeholder="Precio" step="0.01" required style="
                        width: 100%;
                        padding: 10px 10px 10px 35px;
                        border: 1px solid #ddd;
                        border-radius: 5px;
                        font-size: 16px;
                        box-sizing: border-box;
                    ">
                </div>

                <div style="position: relative;">
                    <i class="bi bi-textarea" style="
                        position: absolute;
                        left: 10px;
                        top: 15px;
                        color: #666;
                    "></i>
                    <textarea id="product-description" placeholder="Descripción" required style="
                        width: 100%;
                        padding: 10px 10px 10px 35px;
                        border: 1px solid #ddd;
                        border-radius: 5px;
                        font-size: 16px;
                        min-height: 100px;
                        resize: vertical;
                        box-sizing: border-box;
                    "></textarea>
                </div>

                <div style="position: relative;">
                    <i class="bi bi-image" style="
                        position: absolute;
                        left: 10px;
                        top: 50%;
                        transform: translateY(-50%);
                        color: #666;
                    "></i>
                    <input type="file" id="product-image" accept="image/*" required style="
                        width: 100%;
                        padding: 8px 8px 8px 35px;
                        border: 1px solid #ddd;
                        border-radius: 5px;
                        font-size: 16px;
                        box-sizing: border-box;
                    ">
                </div>

                <button type="submit" style="
                    background: #007bff;
                    color: white;
                    border: none;
                    padding: 12px;
                    border-radius: 5px;
                    font-size: 16px;
                    cursor: pointer;
                    transition: background 0.3s;
                " onmouseover="this.style.background='#0056b3'" 
                  onmouseout="this.style.background='#007bff'">
                    <i class="bi bi-check-circle" style="margin-right: 5px;"></i>Añadir
                </button>
            </form>

            <button id="close-product-modal" class="close-btn" style="
                position: absolute;
                top: 10px;
                right: 10px;
                background: none;
                border: none;
                font-size: 24px;
                color: #666;
                cursor: pointer;
                padding: 0;
                width: 30px;
                height: 30px;
                line-height: 30px;
                text-align: center;
                transition: color 0.3s;
            " onmouseover="this.style.color='#ff0000'" 
              onmouseout="this.style.color='#666'">✖</button>
        </div>
    </div>

    <!-- Contenedor para el feed de productos -->
    <div id="product-feed"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>

    <script>
        // Configuración de Firebase (debes reemplazar con tu propia configuración)
        const firebaseConfig = {
            // Tu configuración de Firebase aquí
            apiKey: "tu-api-key",
            authDomain: "tu-auth-domain",
            projectId: "tu-project-id",
            storageBucket: "tu-storage-bucket",
            messagingSenderId: "tu-messaging-sender-id",
            appId: "tu-app-id"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // Función para inicializar el formulario de añadir producto
        function initializeAddProduct(db, storage, slug, feedContainer) {
            const addProductModal = document.getElementById('add-product-modal');
            const addProductForm = document.getElementById('add-product-form');
            const closeProductModal = document.getElementById('close-product-modal');

            if (!addProductModal || !addProductForm || !closeProductModal) {
                console.error('Elementos necesarios para add-product no encontrados');
                return;
            }

            if (!addProductForm.dataset.submitListenerAdded) {
                addProductForm.dataset.submitListenerAdded = 'true';
                addProductForm.addEventListener('submit', async (event) => {
                    event.preventDefault();
                    event.stopPropagation();

                    try {
                        const productData = {
                            name: document.getElementById('product-name').value,
                            price: parseFloat(document.getElementById('product-price').value),
                            description: document.getElementById('product-description').value,
                            createdAt: new Date().toISOString(),
                        };
                        const productImage = document.getElementById('product-image').files[0];
                        if (productImage) {
                            const imagePath = `stores/${slug}/products/${Date.now()}_${productImage.name}`;
                            const storageRef = firebase.storage().ref(imagePath);
                            await storageRef.put(productImage);
                            productData.imageUrl = await storageRef.getDownloadURL();
                        }
                        await db.collection('stores').doc(slug).collection('products').add(productData);
                        addProductModal.style.display = 'none';
                        addProductForm.reset();
                        await updateProductFeed(db, slug, feedContainer);
                    } catch (error) {
                        console.error('Error al añadir producto:', error.message);
                        alert('Error al añadir producto: ' + error.message);
                    }
                });
            }

            closeProductModal.addEventListener('click', () => {
                addProductModal.style.display = 'none';
                addProductForm.reset();
            });
        }

        // Función para actualizar el feed de productos
        async function updateProductFeed(db, slug, feedContainer) {
            const productsSnapshot = await db.collection('stores').doc(slug).collection('products').get();
            feedContainer.innerHTML = '';
            productsSnapshot.forEach((productDoc) => {
                const product = productDoc.data();
                const productId = productDoc.id;
                const productElement = document.createElement('div');
                productElement.classList.add('product', 'store-product');
                productElement.dataset.productId = productId;
                productElement.innerHTML = `
                    <div class="product-image-container">
                        <img src="${product.imageUrl}" alt="${product.name}" loading="lazy">
                    </div>
                    <div class="product-actions"></div>
                    <div class="product-details">
                        <h3>${product.name}</h3>
                        <p class="description">${product.description || 'Sin descripción'}</p>
                        <p class="price">$${product.price}</p>
                    </div>
                `;
                feedContainer.appendChild(productElement);
            });
        }

        // Inicializar la funcionalidad (reemplaza 'tu-slug' con el slug real de tu tienda)
        const slug = 'tu-slug';
        const feedContainer = document.getElementById('product-feed');
        initializeAddProduct(db, storage, slug, feedContainer);

        // Para mostrar el modal (puedes llamarlo desde un botón por ejemplo)
        // document.getElementById('add-product-modal').style.display = 'block';
    </script>
</body>
</html>

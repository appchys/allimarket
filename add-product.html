<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
    /* Estilos generales */
    * {
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    /* Modal */
    #add-product-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        overflow-y: auto;
    }

    .modal-content {
        background: white;
        margin: 2rem auto;
        padding: 2rem;
        width: 90%;
        max-width: 600px;
        border-radius: 12px;
        position: relative;
    }

    /* Formulario */
    #add-product-form {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
    }

    .form-group {
        position: relative;
        margin-bottom: 1rem;
    }

    .form-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #666;
    }

    /* Inputs */
    #add-product-form input,
    #add-product-form textarea,
    #add-product-form button[type="submit"] {
        width: 100%;
        padding: 12px 16px 12px 40px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 16px;
        transition: all 0.3s ease;
    }

    #product-description {
        padding-left: 40px;
        min-height: 100px;
        resize: vertical;
    }

    #product-image {
        padding: 12px 16px;
    }

    /* File Input personalizado */
    .file-input {
        position: relative;
        overflow: hidden;
    }

    .file-input input[type="file"] {
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        cursor: pointer;
    }

    /* Botones */
    #close-product-modal {
        position: absolute;
        top: 15px;
        right: 15px;
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #666;
    }

    button[type="submit"] {
        background: #4CAF50;
        color: white;
        border: none !important;
        padding: 14px !important;
        font-weight: 600;
        cursor: pointer;
    }

    button[type="submit"]:hover {
        background: #45a049;
    }

    /* Efectos de focus */
    input:focus, textarea:focus {
        border-color: #4CAF50 !important;
        outline: none;
        box-shadow: 0 0 5px rgba(76,175,80,0.3);
    }

    /* Responsive */
    @media (max-width: 768px) {
        .modal-content {
            margin: 1rem auto;
            padding: 1.5rem;
            width: 95%;
        }

        #add-product-form input,
        #add-product-form textarea {
            font-size: 14px;
            padding-left: 36px;
        }
    }
</style>

<div id="add-product-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom: 1.5rem; color: #333; text-align: center;">
            <i class="bi bi-plus-lg" style="margin-right: 8px;"></i>Añadir Producto
        </h2>
        
        <form id="add-product-form">
            <div class="form-group">
                <i class="bi bi-tag form-icon"></i>
                <input type="text" id="product-name" placeholder="Nombre del producto" required>
            </div>

            <div class="form-group">
                <i class="bi bi-currency-dollar form-icon"></i>
                <input type="number" id="product-price" placeholder="Precio" step="0.01" required>
            </div>

            <div class="form-group">
                <i class="bi bi-text-paragraph form-icon"></i>
                <textarea id="product-description" placeholder="Descripción" required></textarea>
            </div>

            <div class="form-group file-input">
                <button type="button" class="bi bi-cloud-upload" style="
                    background: #f0f0f0;
                    border: 2px dashed #ccc;
                    width: 100%;
                    padding: 1.5rem;
                    border-radius: 8px;
                    cursor: pointer;">
                    <br>Seleccionar Imagen
                </button>
                <input type="file" id="product-image" accept="image/*" required>
            </div>

            <button type="submit">
                <i class="bi bi-check2" style="margin-right: 8px;"></i>Guardar Producto
            </button>
        </form>

        <button id="close-product-modal" class="close-btn">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>
</div>

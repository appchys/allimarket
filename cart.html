<!-- cart.html -->
<div id="cart-sidebar" class="cart-sidebar">
    <div class="cart-sidebar-header">
        <h2>Carrito de Compras</h2>
        <button id="close-cart-sidebar" class="close-cart-sidebar">&times;</button>
    </div>
    <div class="cart-sidebar-content">
        <!-- Aquí se insertarán las secciones por tienda dinámicamente -->
        <div class="cart-store-section" data-store-id="store123">
            <h3>Tienda: Store 123</h3>
            <ul>
                <li>Producto 1 - $10.00</li>
                <li>Producto 2 - $15.00</li>
            </ul>
            <button class="checkout-store-btn" data-store-id="store123">Checkout</button>
        </div>
        <div class="cart-store-section" data-store-id="store456">
            <h3>Tienda: Store 456</h3>
            <ul>
                <li>Producto A - $20.00</li>
                <li>Producto B - $25.00</li>
            </ul>
            <button class="checkout-store-btn" data-store-id="store456">Checkout</button>
        </div>
    </div>
    <div class="cart-sidebar-footer">
        <p class="cart-total">Total General: <span id="cart-total">$0.00</span></p>
    </div>
</div>

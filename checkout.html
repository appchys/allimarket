<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        #map {
            width: 100%;
            height: 250px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-center mb-4"><i class="fas fa-shopping-cart"></i> Checkout</h2>
        <form id="checkout-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Nombres y Apellidos</label>
                <input type="text" class="form-control" id="full-name" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Celular</label>
                <input type="tel" class="form-control" id="phone" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Correo Electrónico</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Dirección</label>
                <input type="text" class="form-control" id="address" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-map"></i> Ubicación en el Mapa</label>
                <div id="map"></div>
            </div>
            <h4 class="mt-4"><i class="fas fa-box"></i> Detalle del Carrito</h4>
            <div id="cart-details" class="p-3 border rounded bg-light">
                <!-- Productos dinámicos -->
            </div>
            <h4 class="mt-4"><i class="fas fa-credit-card"></i> Método de Pago</h4>
            <div class="form-group">
                <select class="form-control" id="bank-select">
                    <option value="">Selecciona un banco</option>
                    <option value="pichincha">Banco Pichincha</option>
                    <option value="guayaquil">Banco Guayaquil</option>
                </select>
            </div>
            <div id="bank-details" class="d-none">
                <p><i class="fas fa-info-circle"></i> Datos Bancarios</p>
                <input type="file" class="form-control" id="transfer-proof" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-3">Finalizar Compra</button>
        </form>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-2.1894, -79.8891], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    </script>
</body>
</html>

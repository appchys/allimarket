<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', system-ui;
            background: var(--secondary-color);
            margin: 0;
            padding: 15px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1, h2 {
            color: #1a1a1a;
            margin: 0 0 20px 0;
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 15px;
            color: #666;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
        }

        input:focus, textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        #map {
            border-radius: 10px;
            margin-top: 10px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .bank-details {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        @media (min-width: 768px) {
            body {
                padding: 20px;
                max-width: 500px;
                margin: 0 auto;
            }
        }
    </style>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
    <header class="card" style="background: var(--primary-color); color: white;">
        <h1><i class="bi bi-cart-check"></i> Checkout</h1>
    </header>

    <main>
        <!-- Sección de información del cliente -->
        <div class="card">
            <h2><i class="bi bi-person-circle"></i> Tus Datos</h2>
            <form id="checkout-form">
                <div class="input-group">
                    <i class="bi bi-person"></i>
                    <input type="text" id="full-name" placeholder="Nombre completo" required>
                </div>

                <div class="input-group">
                    <i class="bi bi-phone"></i>
                    <input type="tel" id="phone" placeholder="Número de celular" required>
                </div>

                <div class="input-group">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="email" placeholder="Correo electrónico" required>
                </div>

                <div class="input-group">
                    <i class="bi bi-geo-alt"></i>
                    <input type="text" id="address" placeholder="Dirección de entrega" required>
                </div>

                <div class="input-group">
                    <i class="bi bi-chat-text"></i>
                    <textarea id="references" placeholder="Referencias adicionales" rows="2"></textarea>
                </div>
            </form>
        </div>

        <!-- Sección del mapa -->
        <div class="card">
            <h2><i class="bi bi-geo"></i> Ubicación en Tiempo Real</h2>
            <div id="map" style="height: 200px;"></div>
            <small class="text-muted">Mueve el marcador para ajustar tu ubicación</small>
            <input type="hidden" id="latitude" name="latitude">
            <input type="hidden" id="longitude" name="longitude">
        </div>

        <!-- Método de pago -->
        <div class="card">
            <h2><i class="bi bi-credit-card"></i> Pago</h2>
            <div class="input-group">
                <i class="bi bi-bank"></i>
                <select id="bank-select">
                    <option value="">Selecciona tu banco</option>
                    <option value="pichincha">Banco Pichincha</option>
                    <option value="guayaquil">Banco Guayaquil</option>
                    <option value="pacifico">Banco Pacífico</option>
                    <option value="produbanco">Produbanco</option>
                </select>
            </div>

            <div id="bank-details" class="bank-details" style="display: none;">
                <h3><i class="bi bi-info-circle"></i> Datos para Transferencia</h3>
                <p id="bank-info"></p>
                
                <div class="input-group">
                    <i class="bi bi-image"></i>
                    <input type="file" id="transfer-proof" accept="image/*" style="padding-left: 40px;">
                </div>
                
                <button id="submit-transfer" class="btn-primary">
                    <i class="bi bi-check2-circle"></i> Confirmar Compra
                </button>
            </div>
        </div>

        <!-- Resumen del carrito -->
        <div class="card">
            <h2><i class="bi bi-receipt"></i> Resumen</h2>
            <div id="cart-details"></div>
            <div style="margin-top: 15px;">
                <div class="cart-item">
                    <span>Envío:</span>
                    <span id="shipping-cost">$0.00</span>
                </div>
                <div class="cart-item" style="font-weight: bold;">
                    <span>Total:</span>
                    <span id="total-cost">$0.00</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase y Leaflet JS (mantener igual) -->
    <script type="module" src="checkout.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>

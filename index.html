<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All I Market - Tiendas</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/add-menu.css">
</head>
<body>
    <header>
        <h1>All I Market</h1>
        <div class="header-right">
            <button id="search-toggle-btn"><i class="bi bi-search"></i></button>
            <div id="search-container" style="display: none;">
                <input type="text" id="search-input" placeholder="Buscar productos...">
            </div>
            <div id="auth-section">
                <button id="login-btn">Iniciar Sesión con Google</button>
                <button id="logout-btn" style="display:none;"><i class="bi bi-box-arrow-right"></i></button>
            </div>
        </div>
    </header>
    
    <main>
        <section id="general-stories" class="stories">
            <div id="stories-container" class="stories-grid"></div>
        </section>
        <section id="general-feed" class="feed">
            <h2>Explora Productos</h2>
            <div id="feed-container" class="grid"></div>
            <div id="loading" style="text-align:center; padding: 20px;">Cargando más productos...</div>
        </section>
    </main>

    <!-- Punto de inserción para la barra de navegación -->
    <div id="nav-container"></div>

    <div id="role-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>¿Qué eres?</h2>
            <button id="role-store">Tienda</button>
            <button id="role-client">Cliente</button>
        </div>
    </div>

    <div id="story-view-modal" class="modal" style="display:none;">
        <div class="story-modal-content">
            <img id="story-image" src="" alt="Historia">
            <div id="product-tags"></div>
            <button id="close-story-view" class="close-btn">✖</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script>
        // Cargar la barra de navegación
        fetch('nav.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('nav-container').innerHTML = html;
            })
            .catch(error => console.error('Error al cargar nav.html:', error));

        // Cerrar modal de historia
        document.getElementById('close-story-view').addEventListener('click', () => {
            document.getElementById('story-view-modal').style.display = 'none';
        });

        // Toggle de la barra de búsqueda
        const searchContainer = document.getElementById('search-container');
        const searchToggleBtn = document.getElementById('search-toggle-btn');
        searchToggleBtn.addEventListener('click', () => {
            searchContainer.style.display = searchContainer.style.display === 'none' ? 'flex' : 'none';
        });
    </script>

<!-- Burbuja del carrito -->
<div id="cart-bubble" style="position: fixed; bottom: 20px; right: 20px; display: none; background-color: #007bff; color: white; border-radius: 50%; width: 50px; height: 50px; text-align: center; line-height: 50px; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); cursor: pointer;">
    <i class="bi bi-cart"></i> <span id="cart-count">0</span>
</div>

<!-- Modal del carrito -->
<div id="cart-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <h2>Carrito de Compras</h2>
        <div id="cart-items"></div>
        <button id="close-cart-modal" class="close-btn">✖</button>
    </div>
</div>


</body>
</html>

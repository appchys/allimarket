<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All I Market - Tiendas</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/add-menu.css">
    <link rel="stylesheet" href="css/cart.css">
    <style>
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none; /* Inicialmente oculto */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .story-modal-content {
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        #story-image {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }

        #product-tags {
            margin: 10px 0;
            min-height: 20px;
        }

        .modal-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .action-btn, .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            padding: 5px 10px;
            transition: color 0.3s;
        }

        .delete-btn:hover {
            color: #ff4444;
        }

        .close-btn:hover {
            color: #555;
        }
    </style>
</head>
<body>
    <header>
        <h1>All I Market</h1>
        <div class="header-right">
            <button id="search-toggle-btn"><i class="bi bi-search"></i></button>
            <div id="search-container" style="display: none;">
                <input type="text" id="search-input" placeholder="Buscar productos...">
            </div>
            <div id="auth-section">
                <button id="login-btn">Iniciar Sesión con Google</button>
                <button id="logout-btn" style="display:none;"><i class="bi bi-box-arrow-right"></i></button>
            </div>
        </div>
    </header>
    
    <main>
        <section id="general-stories" class="stories">
            <div id="stories-container" class="stories-grid"></div>
        </section>
        <section id="general-feed" class="feed">
            <h2>Explora Productos</h2>
            <div id="feed-container" class="grid"></div>
            <div id="loading" style="text-align:center; padding: 20px;">Cargando más productos...</div>
        </section>
    </main>

    <!-- Punto de inserción para la barra de navegación -->
    <div id="nav-container"></div>

    <!-- Modal de historias incrustado directamente -->
    <div id="story-view-modal" class="modal">
        <div class="story-modal-content">
            <img id="story-image" src="" alt="Historia">
            <div id="product-tags"></div>
            <div class="modal-buttons">
                <button id="delete-story" class="action-btn delete-btn"><i class="bi bi-trash"></i></button>
                <button id="close-story-view" class="close-btn"><i class="bi bi-x-lg"></i></button>
            </div>
        </div>
    </div>

    <div id="role-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>¿Qué eres?</h2>
            <button id="role-store">Tienda</button>
            <button id="role-client">Cliente</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/story-modal.js"></script>
    <script>
        // Toggle de la barra de búsqueda
        const searchContainer = document.getElementById('search-container');
        const searchToggleBtn = document.getElementById('search-toggle-btn');
        searchToggleBtn.addEventListener('click', () => {
            searchContainer.style.display = searchContainer.style.display === 'none' ? 'flex' : 'none';
        });
    </script>
    <script src="js/cart.js"></script>
</body>
</html>
